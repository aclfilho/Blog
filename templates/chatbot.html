<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Chatbot - André Coronel</title>
  <link rel="stylesheet" href="/static/style.css"/>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/5.15.4/css/all.min.css"/>
</head>
<body>

  <div class="chat-container">
    <div class="chat-header">
      🤖 Chatbot do André
      <p class="chat-subtitle">Converse comigo sobre meus projetos!</p>
    </div>

    <div id="chat-box" class="chat-box">
      <!-- Mensagens aparecerão aqui -->
    </div>

    <div class="input-area">
      <input 
        type="text" 
        id="user-input" 
        placeholder="Digite sua mensagem..." 
        autocomplete="off"
      />
      <button onclick="sendMessage()">
        <i class="fas fa-paper-plane"></i>
      </button>
    </div>
  </div>

  <script>
    const chatBox = document.getElementById('chat-box');
    const userInput = document.getElementById('user-input');

    function appendMessage(text, className) {
      const message = document.createElement('div');
      message.className = `message ${className}`;
      message.textContent = text;
      chatBox.appendChild(message);
      chatBox.scrollTop = chatBox.scrollHeight;
    }

    function sendMessage() {
      const text = userInput.value.trim();
      if (!text) return;
      appendMessage(text, 'user');
      userInput.value = '';

      setTimeout(() => {
        botReply(text);
      }, 500);
    }

    function botReply(text) {
      let reply = "Ainda estou aprendendo! Pergunte algo sobre meus projetos ou digite 'ajuda'.";
      const t = text.toLowerCase();

      if (t.includes("projeto")) {
        reply = "Você pode ver meus projetos na página principal do blog!";
      } else if (t.includes("api")) {
        reply = "Uso FastAPI para criar APIs modernas e rápidas. Posso mostrar um exemplo!";
      } else if (t.includes("olá") || t.includes("oi")) {
        reply = "Olá! Como posso ajudar?";
      }

      appendMessage(reply, 'bot');
    }

    userInput.addEventListener("keypress", function (e) {
      if (e.key === "Enter") {
        sendMessage();
      }
    });
  </script>
</body>
</html>
